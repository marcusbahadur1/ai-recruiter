name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy type check
        run: mypy app --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking until type coverage improves

  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # All defaults come from conftest.py; CI overrides can be set via secrets.
      DATABASE_URL: postgresql+asyncpg://test:test@localhost/airecruiter_test
      SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL || 'https://test.supabase.co' }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-service-key' }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-anon-key' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-key' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-openai-key' }}
      REDIS_URL: redis://localhost:6379/0
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_dummy' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_dummy' }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY || 'SG.test-platform-key' }}
      IMAP_HOST: mail.test.com
      IMAP_MASTER_PASSWORD: test-password
      ENCRYPTION_KEY: bXlfdGVzdF9rZXlfZm9yX3Rlc3RpbmdfcHVycG9zZXM=
      ENVIRONMENT: development

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: airecruiter_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=85 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Build check ───────────────────────────────────────────────────────────────
  build-check:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            --tag ai-recruiter-backend:ci \
            --file backend/Dockerfile \
            backend/
        timeout-minutes: 10
