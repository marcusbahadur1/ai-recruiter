name: Staging Smoke Tests

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Run automatically after the main CI passes on main (staging auto-deploys from main)
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

  # Also allow manual trigger with optional URL override
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging frontend URL (leave blank for default)'
        required: false
        default: ''
      staging_api_url:
        description: 'Staging API URL (leave blank for default)'
        required: false
        default: ''

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  smoke:
    name: Staging smoke tests
    runs-on: ubuntu-latest

    # Only run if CI passed (when triggered by workflow_run)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      STAGING_URL: ${{ github.event.inputs.staging_url || secrets.STAGING_URL || 'https://staging.app.airecruiterz.com' }}
      STAGING_API_URL: ${{ github.event.inputs.staging_api_url || secrets.STAGING_API_URL || 'https://staging-api.airecruiterz.com' }}
      STAGING_TEST_EMAIL: ${{ secrets.STAGING_TEST_EMAIL }}
      STAGING_TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright + deps
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Wait for staging to be ready
        run: |
          echo "Waiting for staging API to respond..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_API_URL/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging API is up."
              break
            fi
            if [ $i -eq 12 ]; then
              echo "Staging API did not become ready in time."
              exit 1
            fi
            sleep 10
          done

      - name: Run smoke tests
        working-directory: e2e
        run: npm run smoke
        timeout-minutes: 10

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report-${{ github.run_number }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 14

      - name: Print failure summary
        if: failure()
        run: |
          echo "Staging smoke tests FAILED."
          echo "Check the uploaded Playwright report artifact for screenshots and traces."
